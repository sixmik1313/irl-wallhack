<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WALLHACK // REAL LIFE</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/tensorflow/4.10.0/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/coco-ssd@2.2.2/dist/coco-ssd.min.js"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&display=swap');

  :root {
    --neon-green: #00ff41;
    --neon-red: #ff0040;
    --neon-blue: #00d4ff;
    --neon-yellow: #ffee00;
    --bg: #000a00;
    --panel: rgba(0, 255, 65, 0.05);
    --border: rgba(0, 255, 65, 0.3);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--neon-green);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* Scanlines overlay */
  body::before {
    content: '';
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.15) 2px,
      rgba(0,0,0,0.15) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  /* CRT flicker */
  body::after {
    content: '';
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: radial-gradient(ellipse at center, transparent 60%, rgba(0,0,0,0.6) 100%);
    pointer-events: none;
    z-index: 99;
    animation: flicker 8s infinite;
  }

  @keyframes flicker {
    0%, 95%, 100% { opacity: 1; }
    96% { opacity: 0.85; }
    97% { opacity: 1; }
    98% { opacity: 0.9; }
  }

  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 20px;
    border-bottom: 1px solid var(--border);
    background: rgba(0,10,0,0.9);
    z-index: 10;
    position: relative;
  }

  .title {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: 1.4rem;
    letter-spacing: 0.3em;
    text-shadow: 0 0 10px var(--neon-green), 0 0 30px var(--neon-green);
    animation: pulse-title 3s ease-in-out infinite;
  }

  @keyframes pulse-title {
    0%, 100% { text-shadow: 0 0 10px var(--neon-green), 0 0 30px var(--neon-green); }
    50% { text-shadow: 0 0 20px var(--neon-green), 0 0 60px var(--neon-green), 0 0 80px var(--neon-green); }
  }

  .status-bar {
    display: flex;
    gap: 20px;
    font-size: 0.7rem;
    opacity: 0.8;
  }

  .status-item { display: flex; flex-direction: column; align-items: center; }
  .status-label { opacity: 0.5; font-size: 0.6rem; }
  .status-value { color: var(--neon-blue); }

  .main {
    flex: 1;
    display: flex;
    position: relative;
  }

  .video-container {
    position: relative;
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #000;
  }

  video {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    filter: brightness(0.7) contrast(1.1) saturate(0.3);
    transform: scaleX(-1);
  }

  canvas {
    position: absolute;
    top: 0; left: 0;
    width: 100%;
    height: 100%;
    pointer-events: none;
    transform: scaleX(-1);
  }

  /* Side panel */
  .side-panel {
    width: 220px;
    background: rgba(0,10,0,0.95);
    border-left: 1px solid var(--border);
    padding: 15px 12px;
    display: flex;
    flex-direction: column;
    gap: 16px;
    font-size: 0.72rem;
    z-index: 10;
  }

  .panel-section {
    border: 1px solid var(--border);
    background: var(--panel);
    padding: 10px;
  }

  .panel-title {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    color: var(--neon-green);
    opacity: 0.7;
    margin-bottom: 8px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 4px;
  }

  .stat-row {
    display: flex;
    justify-content: space-between;
    margin: 4px 0;
    opacity: 0.8;
  }
  .stat-val { color: var(--neon-blue); font-weight: bold; }

  #target-list { display: flex; flex-direction: column; gap: 4px; }
  .target-item {
    padding: 4px 6px;
    border-left: 2px solid var(--neon-red);
    background: rgba(255,0,64,0.08);
    font-size: 0.65rem;
    animation: blink-in 0.2s ease-out;
  }
  @keyframes blink-in {
    from { opacity: 0; transform: translateX(-5px); }
    to { opacity: 1; transform: translateX(0); }
  }

  .no-target { opacity: 0.4; font-size: 0.65rem; font-style: italic; }

  /* START screen */
  #start-screen {
    position: absolute;
    inset: 0;
    background: rgba(0,5,0,0.97);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 50;
    gap: 30px;
  }

  .start-title {
    font-family: 'Orbitron', sans-serif;
    font-weight: 900;
    font-size: clamp(2rem, 6vw, 4rem);
    letter-spacing: 0.4em;
    text-align: center;
    text-shadow: 0 0 20px var(--neon-green), 0 0 60px var(--neon-green);
    animation: pulse-title 2s ease-in-out infinite;
  }

  .start-sub {
    font-size: 0.85rem;
    opacity: 0.6;
    letter-spacing: 0.15em;
    text-align: center;
  }

  .start-btn {
    font-family: 'Orbitron', sans-serif;
    font-size: 0.9rem;
    letter-spacing: 0.3em;
    padding: 14px 40px;
    background: transparent;
    color: var(--neon-green);
    border: 2px solid var(--neon-green);
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
    box-shadow: 0 0 15px rgba(0,255,65,0.3), inset 0 0 15px rgba(0,255,65,0.05);
  }
  .start-btn:hover {
    background: var(--neon-green);
    color: #000;
    box-shadow: 0 0 40px rgba(0,255,65,0.8);
  }

  .loading-bar-wrap {
    width: 260px;
    height: 3px;
    background: rgba(0,255,65,0.15);
    display: none;
  }
  .loading-bar-fill {
    height: 100%;
    background: var(--neon-green);
    width: 0%;
    transition: width 0.3s;
    box-shadow: 0 0 10px var(--neon-green);
  }

  #loading-msg {
    font-size: 0.7rem;
    opacity: 0.6;
    letter-spacing: 0.1em;
    min-height: 1em;
  }

  /* Corner decorations */
  .corner { position: absolute; width: 20px; height: 20px; }
  .corner.tl { top: 8px; left: 8px; border-top: 2px solid var(--neon-green); border-left: 2px solid var(--neon-green); }
  .corner.tr { top: 8px; right: 8px; border-top: 2px solid var(--neon-green); border-right: 2px solid var(--neon-green); }
  .corner.bl { bottom: 8px; left: 8px; border-bottom: 2px solid var(--neon-green); border-left: 2px solid var(--neon-green); }
  .corner.br { bottom: 8px; right: 8px; border-bottom: 2px solid var(--neon-green); border-right: 2px solid var(--neon-green); }

  /* Scrolling data feed */
  #data-feed {
    font-size: 0.6rem;
    opacity: 0.4;
    overflow: hidden;
    max-height: 80px;
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .feed-line { white-space: nowrap; }

  /* Mode toggle */
  .mode-btns {
    display: flex;
    gap: 5px;
    flex-wrap: wrap;
  }
  .mode-btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem;
    padding: 4px 8px;
    background: transparent;
    border: 1px solid var(--border);
    color: var(--neon-green);
    cursor: pointer;
    letter-spacing: 0.1em;
    transition: all 0.15s;
  }
  .mode-btn.active, .mode-btn:hover {
    background: rgba(0,255,65,0.15);
    border-color: var(--neon-green);
    box-shadow: 0 0 8px rgba(0,255,65,0.4);
  }
</style>
</head>
<body>

<header>
  <div class="title">◈ WALLHACK.exe</div>
  <div class="status-bar">
    <div class="status-item">
      <span class="status-label">TARGETS</span>
      <span class="status-value" id="hdr-count">0</span>
    </div>
    <div class="status-item">
      <span class="status-label">FPS</span>
      <span class="status-value" id="hdr-fps">--</span>
    </div>
    <div class="status-item">
      <span class="status-label">STATUS</span>
      <span class="status-value" id="hdr-status">INIT</span>
    </div>
  </div>
</header>

<div class="main">
  <!-- Start screen -->
  <div id="start-screen">
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
    <div class="start-title">WALLHACK</div>
    <div class="start-sub">// REAL LIFE PERSON DETECTION //</div>
    <button class="start-btn" onclick="startSystem()">▶ ACTIVER</button>
    <div class="loading-bar-wrap" id="loading-wrap">
      <div class="loading-bar-fill" id="loading-bar"></div>
    </div>
    <div id="loading-msg"></div>
  </div>

  <!-- Video feed -->
  <div class="video-container">
    <video id="video" autoplay muted playsinline></video>
    <canvas id="canvas"></canvas>
  </div>

  <!-- Side panel -->
  <div class="side-panel">
    <div class="panel-section">
      <div class="panel-title">// STATISTIQUES</div>
      <div class="stat-row"><span>CIBLES DÉTECTÉES</span><span class="stat-val" id="stat-count">0</span></div>
      <div class="stat-row"><span>CONFIANCE MAX</span><span class="stat-val" id="stat-conf">--</span></div>
      <div class="stat-row"><span>TOTAL DÉTECTIONS</span><span class="stat-val" id="stat-total">0</span></div>
      <div class="stat-row"><span>FRAMES ANALYSÉES</span><span class="stat-val" id="stat-frames">0</span></div>
    </div>

    <div class="panel-section">
      <div class="panel-title">// MODE VISUEL</div>
      <div class="mode-btns">
        <button class="mode-btn active" onclick="setMode('box')" id="btn-box">BBOX</button>
        <button class="mode-btn" onclick="setMode('neon')" id="btn-neon">NÉON</button>
        <button class="mode-btn" onclick="setMode('xray')" id="btn-xray">X-RAY</button>
        <button class="mode-btn" onclick="setMode('outline')" id="btn-outline">OUTLINE</button>
      </div>
    </div>

    <div class="panel-section">
      <div class="panel-title">// CIBLES ACTIVES</div>
      <div id="target-list"><div class="no-target">EN ATTENTE...</div></div>
    </div>

    <div class="panel-section">
      <div class="panel-title">// FLUX DONNÉES</div>
      <div id="data-feed"></div>
    </div>
  </div>
</div>

<script>
let model = null;
let video = document.getElementById('video');
let canvas = document.getElementById('canvas');
let ctx = canvas.getContext('2d');
let animFrame;
let totalDetections = 0;
let frameCount = 0;
let lastFpsTime = performance.now();
let currentMode = 'box';
let detectionHistory = [];

const COLORS = {
  person: '#ff0040',
  other: '#00d4ff',
};

function setMode(m) {
  currentMode = m;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('btn-' + m).classList.add('active');
}

async function startSystem() {
  const btn = document.querySelector('.start-btn');
  btn.disabled = true;
  btn.textContent = 'INITIALISATION...';

  document.getElementById('loading-wrap').style.display = 'block';
  setLoadingMsg('▸ Accès caméra...');
  setLoadingBar(10);

  try {
    const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' }, audio: false });
    video.srcObject = stream;
    await new Promise(r => video.onloadedmetadata = r);
  } catch(e) {
    setLoadingMsg('✗ Caméra refusée. Autorise l\'accès.');
    btn.disabled = false;
    btn.textContent = '▶ RÉESSAYER';
    return;
  }

  setLoadingMsg('▸ Chargement IA (COCO-SSD)...');
  setLoadingBar(40);

  model = await cocoSsd.load({ base: 'mobilenet_v2' });

  setLoadingBar(90);
  setLoadingMsg('▸ Système prêt.');
  setLoadingBar(100);

  await new Promise(r => setTimeout(r, 400));

  document.getElementById('start-screen').style.display = 'none';
  document.getElementById('hdr-status').textContent = 'ACTIF';

  resizeCanvas();
  window.addEventListener('resize', resizeCanvas);
  detect();
}

function setLoadingMsg(t) { document.getElementById('loading-msg').textContent = t; }
function setLoadingBar(p) { document.getElementById('loading-bar').style.width = p + '%'; }

function resizeCanvas() {
  const rect = video.getBoundingClientRect();
  canvas.width = rect.width;
  canvas.height = rect.height;
}

let lastTime = performance.now();
async function detect() {
  if (!model) return;
  frameCount++;

  // FPS
  const now = performance.now();
  if (now - lastFpsTime > 500) {
    const fps = Math.round(frameCount / ((now - lastFpsTime) / 1000) * (now - lastFpsTime > 0 ? 1 : 0));
    const elapsed = (now - lastFpsTime);
    document.getElementById('hdr-fps').textContent = Math.round(frameCount / (elapsed / 1000));
    frameCount = 0;
    lastFpsTime = now;
  }

  document.getElementById('stat-frames').textContent = parseInt(document.getElementById('stat-frames').textContent || 0) + 1;

  let predictions = [];
  try {
    predictions = await model.detect(video);
  } catch(e) {}

  // Only persons for wallhack effect, but show all
  const persons = predictions.filter(p => p.class === 'person');
  const others = predictions.filter(p => p.class !== 'person');

  totalDetections += persons.length;

  updateUI(predictions, persons);
  draw(predictions, persons);

  animFrame = requestAnimationFrame(detect);
}

function updateUI(all, persons) {
  const count = persons.length;
  document.getElementById('hdr-count').textContent = count;
  document.getElementById('stat-count').textContent = count;
  document.getElementById('stat-total').textContent = totalDetections;

  if (persons.length > 0) {
    const maxConf = Math.max(...persons.map(p => p.score));
    document.getElementById('stat-conf').textContent = (maxConf * 100).toFixed(0) + '%';
  } else {
    document.getElementById('stat-conf').textContent = '--';
  }

  // Target list
  const tl = document.getElementById('target-list');
  if (persons.length === 0) {
    tl.innerHTML = '<div class="no-target">AUCUNE CIBLE</div>';
  } else {
    tl.innerHTML = persons.map((p, i) => {
      const conf = (p.score * 100).toFixed(0);
      const [x, y, w, h] = p.bbox;
      return `<div class="target-item">TGT-${String(i+1).padStart(2,'0')} &nbsp; ${conf}% &nbsp; [${Math.round(w)}×${Math.round(h)}]</div>`;
    }).join('');
  }

  // Data feed
  if (all.length > 0) {
    const feed = document.getElementById('data-feed');
    const line = document.createElement('div');
    line.className = 'feed-line';
    const ts = new Date().toLocaleTimeString('fr', {hour12: false});
    const classes = all.map(p => p.class).join(', ');
    line.textContent = `[${ts}] ${all.length}x: ${classes}`;
    feed.insertBefore(line, feed.firstChild);
    while (feed.children.length > 8) feed.removeChild(feed.lastChild);
  }
}

function draw(all, persons) {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  const scaleX = canvas.width / video.videoWidth;
  const scaleY = canvas.height / video.videoHeight;

  // Draw non-person detections subtly
  for (const p of all.filter(x => x.class !== 'person')) {
    const [x, y, w, h] = p.bbox;
    const sx = x * scaleX, sy = y * scaleY, sw = w * scaleX, sh = h * scaleY;
    ctx.strokeStyle = 'rgba(0,212,255,0.4)';
    ctx.lineWidth = 1;
    ctx.strokeRect(sx, sy, sw, sh);
    ctx.fillStyle = 'rgba(0,212,255,0.6)';
    ctx.font = '10px Share Tech Mono, monospace';
    ctx.fillText(p.class + ' ' + (p.score*100).toFixed(0)+'%', sx+4, sy+12);
  }

  // Draw persons with wallhack style
  for (let i = 0; i < persons.length; i++) {
    const p = persons[i];
    const [x, y, w, h] = p.bbox;
    const sx = x * scaleX, sy = y * scaleY, sw = w * scaleX, sh = h * scaleY;
    const conf = p.score;

    switch(currentMode) {
      case 'box': drawBox(sx, sy, sw, sh, conf, i); break;
      case 'neon': drawNeon(sx, sy, sw, sh, conf, i); break;
      case 'xray': drawXray(sx, sy, sw, sh, conf, i); break;
      case 'outline': drawOutline(sx, sy, sw, sh, conf, i); break;
    }

    // Head indicator
    const headSize = sw * 0.25;
    const headX = sx + sw / 2;
    const headY = sy + headSize * 0.5;
    drawHead(headX, headY, headSize, i);

    // Label
    const label = `TGT-${String(i+1).padStart(2,'0')} ${(conf*100).toFixed(0)}%`;
    ctx.font = 'bold 11px "Share Tech Mono", monospace';
    ctx.fillStyle = '#ff0040';
    ctx.shadowColor = '#ff0040';
    ctx.shadowBlur = 8;
    ctx.fillText(label, sx + 2, sy - 6);
    ctx.shadowBlur = 0;
  }

  // Crosshair on nearest target
  if (persons.length > 0) {
    const biggest = persons.reduce((a, b) => (a.bbox[2]*a.bbox[3] > b.bbox[2]*b.bbox[3]) ? a : b);
    const [x, y, w, h] = biggest.bbox;
    const cx = (x + w/2) * scaleX, cy = (y + h/2) * scaleY;
    drawCrosshair(cx, cy);
  }
}

function drawBox(x, y, w, h, conf, idx) {
  const alpha = 0.5 + conf * 0.5;
  // Glow layers
  for (let g = 3; g >= 1; g--) {
    ctx.strokeStyle = `rgba(255,0,64,${alpha * 0.15 * g})`;
    ctx.lineWidth = g * 4;
    ctx.strokeRect(x - g*2, y - g*2, w + g*4, h + g*4);
  }
  ctx.strokeStyle = `rgba(255,0,64,${alpha})`;
  ctx.lineWidth = 2;
  ctx.strokeRect(x, y, w, h);

  // Fill
  ctx.fillStyle = `rgba(255,0,64,0.07)`;
  ctx.fillRect(x, y, w, h);

  // Corner brackets
  const cs = 18;
  ctx.strokeStyle = '#ff0040';
  ctx.lineWidth = 2;
  ctx.shadowColor = '#ff0040';
  ctx.shadowBlur = 10;
  [[x,y],[x+w,y],[x,y+h],[x+w,y+h]].forEach(([cx,cy], i) => {
    const dx = i%2===0?1:-1, dy = i<2?1:-1;
    ctx.beginPath();
    ctx.moveTo(cx + dx*cs, cy); ctx.lineTo(cx, cy); ctx.lineTo(cx, cy + dy*cs);
    ctx.stroke();
  });
  ctx.shadowBlur = 0;
}

function drawNeon(x, y, w, h, conf, idx) {
  const colors = ['#ff0040','#ff6600','#ffee00'];
  const col = colors[idx % colors.length];
  for (let g = 5; g >= 1; g--) {
    ctx.strokeStyle = col;
    ctx.lineWidth = g * 3;
    ctx.globalAlpha = 0.06 * g;
    ctx.strokeRect(x - g, y - g, w + g*2, h + g*2);
  }
  ctx.globalAlpha = 1;
  ctx.strokeStyle = col;
  ctx.lineWidth = 1.5;
  ctx.shadowColor = col;
  ctx.shadowBlur = 20;
  ctx.strokeRect(x, y, w, h);
  ctx.shadowBlur = 0;
  ctx.fillStyle = col.replace(')', ',0.05)').replace('rgb', 'rgba').replace('#', 'rgba(').replace('ff0040,','255,0,64,').replace('ff6600,','255,102,0,').replace('ffee00,','255,238,0,');
  // simpler fill
  ctx.globalAlpha = 0.06;
  ctx.fillStyle = col;
  ctx.fillRect(x, y, w, h);
  ctx.globalAlpha = 1;
}

function drawXray(x, y, w, h, conf, idx) {
  // Blue-white skeleton style
  const gradient = ctx.createLinearGradient(x, y, x, y+h);
  gradient.addColorStop(0, 'rgba(0,212,255,0.3)');
  gradient.addColorStop(0.5, 'rgba(255,255,255,0.15)');
  gradient.addColorStop(1, 'rgba(0,212,255,0.3)');
  ctx.fillStyle = gradient;
  ctx.fillRect(x, y, w, h);

  ctx.strokeStyle = '#00d4ff';
  ctx.lineWidth = 1;
  ctx.shadowColor = '#00d4ff';
  ctx.shadowBlur = 15;
  ctx.strokeRect(x, y, w, h);
  ctx.shadowBlur = 0;

  // Horizontal scan line
  const t = (Date.now() % 2000) / 2000;
  const scanY = y + h * t;
  const scanGrad = ctx.createLinearGradient(x, scanY - 5, x, scanY + 5);
  scanGrad.addColorStop(0, 'transparent');
  scanGrad.addColorStop(0.5, 'rgba(0,212,255,0.8)');
  scanGrad.addColorStop(1, 'transparent');
  ctx.fillStyle = scanGrad;
  ctx.fillRect(x, scanY - 5, w, 10);
}

function drawOutline(x, y, w, h, conf, idx) {
  // Dashed outline
  ctx.setLineDash([6, 4]);
  ctx.strokeStyle = '#ff0040';
  ctx.lineWidth = 2;
  ctx.shadowColor = '#ff0040';
  ctx.shadowBlur = 12;
  ctx.strokeRect(x, y, w, h);
  ctx.setLineDash([]);
  ctx.shadowBlur = 0;

  // Inner pulse
  const pulse = (Math.sin(Date.now() / 300) + 1) / 2;
  ctx.strokeStyle = `rgba(255,0,64,${pulse * 0.5})`;
  ctx.lineWidth = 8;
  ctx.strokeRect(x + 4, y + 4, w - 8, h - 8);
}

function drawHead(cx, cy, r, idx) {
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.strokeStyle = '#ff0040';
  ctx.lineWidth = 2;
  ctx.shadowColor = '#ff0040';
  ctx.shadowBlur = 12;
  ctx.stroke();
  ctx.shadowBlur = 0;
}

function drawCrosshair(cx, cy) {
  const size = 25, gap = 8;
  ctx.strokeStyle = 'rgba(255,0,64,0.6)';
  ctx.lineWidth = 1.5;
  ctx.shadowColor = '#ff0040';
  ctx.shadowBlur = 8;
  ctx.beginPath();
  // Horizontal
  ctx.moveTo(cx - size, cy); ctx.lineTo(cx - gap, cy);
  ctx.moveTo(cx + gap, cy); ctx.lineTo(cx + size, cy);
  // Vertical
  ctx.moveTo(cx, cy - size); ctx.lineTo(cx, cy - gap);
  ctx.moveTo(cx, cy + gap); ctx.lineTo(cx, cy + size);
  ctx.stroke();
  ctx.shadowBlur = 0;
}
</script>
</body>
